services:
  - type: web
    name: ngn-nclex-simulator
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    # Render injects PORT automatically — the Dockerfile reads it at runtime.
    # No hardcoded port needed here; leave envVars minimal.
    envVars:
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
      - key: STREAMLIT_SERVER_ADDRESS
        value: "0.0.0.0"
      - key: STREAMLIT_BROWSER_GATHER_USAGE_STATS
        value: "false"
